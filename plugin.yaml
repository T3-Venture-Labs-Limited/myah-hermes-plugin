# Hermes plugin manifest.
#
# This file is required for `hermes plugins install <owner>/<repo>` to
# recognize this directory as a plugin and load it on hermes startup.
# Upstream loader: hermes_cli/plugins_cmd.py:347 (reads manifest) +
# plugins.py:826 (manifest discovery).

manifest_version: 1
name: myah
version: 1.1.0

description: |
  Myah platform adapter for Hermes Agent. Installs the Myah platform
  integration so a separately-running Myah web frontend (https://myah.dev)
  can connect to your local hermes-agent instance.

  The plugin exposes:
  - The `myah` platform via ctx.register_platform(...) — the canonical
    integration surface for any UI that wants to render Hermes runs.
  - `/myah/*` HTTP routes inside the hermes gateway (chat, health,
    secrets, runtime-admin).
  - A `hermes-myah` toolset that gives the agent runtime access to
    Myah-specific facilities.

author: T3 Venture Labs Limited
homepage: https://myah.dev
repository: https://github.com/T3-Venture-Labs-Limited/myah-hermes-plugin
license: MIT

# Environment variables this plugin needs in ~/.hermes/.env before its
# routes will accept requests. ``hermes plugins install`` reads this block
# (see ``hermes_cli/plugins_cmd.py:_prompt_plugin_env_vars``) and prompts
# the user for each name that isn't already set. Empty input is treated
# as "skip — I'll set this later".
#
# MYAH_ADAPTER_AUTH_KEY is the shared bearer between the Myah platform
# container and this plugin's standalone HTTP runner. The canonical flow
# for OSS users is:
#
#   1. ``hermes plugins install T3-Venture-Labs-Limited/myah-hermes-plugin``
#      → user can skip this prompt with an empty value; the routes will
#      load but every authed endpoint returns 503 until the key is set.
#   2. ``git clone … myah && cd myah && ./scripts/setup-myah-oss.sh``
#      → setup script generates the key, writes it to BOTH the platform
#      ``.env`` and ``~/.hermes/.env`` so both sides agree.
#   3. ``hermes gateway restart`` → adapter picks up the key, requests
#      start succeeding.
#
# Setting this value manually here only makes sense for hosted-mode
# deployments where the platform side already has a fixed bearer token.
requires_env:
  - name: MYAH_ADAPTER_AUTH_KEY
    description: |
      Shared bearer token between the Myah platform container and this
      plugin. Press Enter to skip — `scripts/setup-myah-oss.sh` in the
      Myah platform clone will generate one and write it here.
    secret: true
